<!DOCTYPE html>
<html id="mainHtml" style="visibility: hidden;">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="title-bar">
        <div class="title-bar-controls">
            <button data-action="min">&#xE921;</button>
            <button data-action="max">&#xE922;</button>
            <button data-action="close" id="close-btn">&#xE8BB;</button>
        </div>
    </div>

    <div class="box">
        <h2 id="welcomeHeader" class="hidden">Welcome, <span id="userDisplay"></span></h2>
        <button id="recordBtn"  class="main-btn"><i class="fas fa-microphone"></i> Start Recording</button>
        <button id="monitorBtn" class="secondary-btn"><i class="fas fa-eye"></i> View Monitor</button>
        <div class="divider">
            <a id="logoutLink" href="#">LOG OUT</a>
        </div>
    </div>

    <script src="../scripts/titlebar.js"></script>
    <script type="module" src="../scripts/hub.js"></script>
</body>
</html>
